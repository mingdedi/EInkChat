<!DOCTYPE html>
<!--
  E-Ink LLM Chat
  Pure front-end local tool. API keys and configuration are stored ONLY in
  this device's browser localStorage. No data is uploaded to any server other
  than the LLM endpoint you configure. Open source, zero dependencies.
-->
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>E-Ink LLM Chat</title>
<style>
/* ---- E-Ink reset: kill every animation, transition, and soft visual ---- */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  transition: none !important;
  animation: none !important;
  -webkit-tap-highlight-color: transparent;
  text-shadow: none !important;
  box-shadow: none !important;
}

html, body {
  width: 100%;
  background: #FFFFFF;
  color: #000000;
  font-family: "Droid Sans Fallback", "Noto Sans CJK SC", sans-serif;
  font-size: 16px;
  line-height: 1.6;
  -webkit-font-smoothing: none;
  font-smooth: never;
}
html { height: 100%; }
/* Let body grow with content so padding-bottom actually creates space below
   the last message. With height:100% the body is clipped to viewport and
   overflow content escapes the padding, allowing the fixed input bar to
   cover the last bubble. */
body { min-height: 100%; }

body {
  display: block;
  /* Reserve space for fixed input bar; JS overrides this with the actual
     measured inputbar height so multi-line textarea never covers messages. */
  padding-bottom: 128px;
}

/* ---- Top bar ---- */
.topbar {
  display: block;
  width: 100%;
  border-bottom: 2px solid #000000;
  padding: 12px 16px;
  background: #FFFFFF;
}
.topbar .title {
  display: inline-block;
  font-size: 18px;
  font-weight: bold;
  vertical-align: middle;
}
.topbar .settings-btn {
  display: inline-block;
  float: right;
  min-width: 48px;
  min-height: 48px;
  line-height: 48px;
  text-align: center;
  border: 2px solid #000000;
  background: #FFFFFF;
  color: #000000;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  padding: 0 12px;
  border-radius: 0;
}

/* ---- Model switcher bar (shown in chat view) ---- */
.modelbar {
  display: block;
  width: 100%;
  border-bottom: 2px solid #000000;
  padding: 8px 16px;
  background: #FFFFFF;
}
.modelbar label {
  display: inline-block;
  font-size: 14px;
  font-weight: bold;
  margin-right: 8px;
  vertical-align: middle;
}
.modelbar select {
  display: inline-block;
  min-height: 48px;
  font-size: 16px;
  border: 2px solid #000000;
  background: #FFFFFF;
  color: #000000;
  border-radius: 0;
  padding: 4px 8px;
  vertical-align: middle;
  font-family: inherit;
  max-width: 60%;
}
.modelbar .empty {
  display: inline-block;
  font-size: 14px;
  vertical-align: middle;
}

/* ---- Settings panel ---- */
.settings {
  display: none;
  width: 100%;
  border-bottom: 2px solid #000000;
  padding: 16px;
  background: #FFFFFF;
}
.settings.open { display: block; }

.settings h2 {
  display: block;
  font-size: 16px;
  font-weight: bold;
  margin-bottom: 12px;
  padding-bottom: 4px;
  border-bottom: 2px solid #000000;
}

.settings .toolbar {
  display: block;
  margin-bottom: 16px;
}
.settings .toolbar button {
  display: inline-block;
  min-height: 48px;
  font-size: 16px;
  font-weight: bold;
  border: 2px solid #000000;
  background: #FFFFFF;
  color: #000000;
  cursor: pointer;
  padding: 0 12px;
  border-radius: 0;
  margin-right: 8px;
  margin-bottom: 8px;
}

/* ---- Export area (shown inside settings) ---- */
.export-area {
  display: block;
  border: 2px solid #000000;
  padding: 12px;
  margin-bottom: 16px;
}
.export-area label {
  display: block;
  font-size: 14px;
  margin-bottom: 8px;
}
.export-area textarea {
  display: block;
  width: 100%;
  min-height: 120px;
  max-height: 240px;
  padding: 8px;
  font-size: 14px;
  line-height: 1.4;
  border: 2px solid #000000;
  background: #FFFFFF;
  color: #000000;
  font-family: monospace;
  border-radius: 0;
  outline: none;
  resize: vertical;
  overflow: auto;
}
.export-area .export-actions {
  display: block;
  margin-top: 8px;
}
.export-area .export-actions button {
  display: inline-block;
  min-height: 48px;
  font-size: 16px;
  font-weight: bold;
  border: 2px solid #000000;
  background: #FFFFFF;
  color: #000000;
  cursor: pointer;
  padding: 0 12px;
  border-radius: 0;
  margin-right: 8px;
}

.settings .empty-hint {
  display: block;
  font-size: 14px;
  padding: 12px;
  border: 2px dashed #000000;
  margin-bottom: 12px;
}

.model-card {
  display: block;
  width: 100%;
  border: 2px solid #000000;
  padding: 12px;
  margin-bottom: 16px;
}
.model-card.current {
  border-left-width: 6px;
}
.model-card .card-header {
  display: block;
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 2px solid #000000;
}
.model-card .card-header .name {
  display: inline-block;
  font-size: 16px;
  font-weight: bold;
  vertical-align: middle;
}
.model-card .card-header .badge {
  display: inline-block;
  font-size: 14px;
  font-weight: bold;
  border: 2px solid #000000;
  padding: 0 6px;
  margin-left: 8px;
  vertical-align: middle;
}
.model-card .row { display: block; margin-bottom: 12px; }
.model-card label {
  display: block;
  font-size: 16px;
  font-weight: bold;
  margin-bottom: 4px;
}
.model-card input[type="text"],
.model-card input[type="password"],
.model-card textarea {
  display: block;
  width: 100%;
  min-height: 48px;
  padding: 8px 12px;
  font-size: 16px;
  border: 2px solid #000000;
  background: #FFFFFF;
  color: #000000;
  border-radius: 0;
  outline: none;
  font-family: inherit;
  resize: vertical;
}
.model-card .hint {
  display: block;
  font-size: 14px;
  margin-top: 4px;
}
.model-card .actions {
  display: block;
  margin-top: 8px;
}
.model-card .actions button {
  display: inline-block;
  min-height: 48px;
  font-size: 16px;
  font-weight: bold;
  border: 2px solid #000000;
  background: #FFFFFF;
  color: #000000;
  cursor: pointer;
  padding: 0 12px;
  border-radius: 0;
  margin-right: 8px;
  margin-bottom: 4px;
}
.model-card .actions button.primary {
  background: #000000;
  color: #FFFFFF;
}
.model-card .actions button:disabled {
  background: #000000;
  color: #FFFFFF;
  cursor: default;
}

/* ---- Chat area ---- */
.chat {
  display: block;
  width: 100%;
  padding: 16px;
}
.msg {
  display: block;
  width: 100%;
  margin-bottom: 16px;
  overflow: hidden;
}
.msg .meta {
  display: block;
  font-size: 12px;
  font-weight: bold;
  margin-bottom: 4px;
}
.msg.user .meta { text-align: right; }
.msg.bot .meta { text-align: left; }
.msg .bubble {
  display: inline-block;
  max-width: 85%;
  padding: 8px 12px;
  font-size: 16px;
  line-height: 1.6;
  border: 2px solid #000000;
  background: #FFFFFF;
  color: #000000;
  white-space: pre-wrap;
  word-break: break-word;
  border-radius: 0;
}
.msg.user { text-align: right; }
.msg.user .bubble {
  text-align: left;
  border-right-width: 6px;
}
.msg.bot { text-align: left; }
.msg.bot .bubble {
  border-left-width: 6px;
}
.msg.sys .bubble {
  border-style: dashed;
  border-width: 2px;
  font-size: 14px;
}

/* ---- Fixed input bar ---- */
.inputbar {
  display: block;
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;
  width: 100%;
  border-top: 2px solid #000000;
  background: #FFFFFF;
  padding: 8px;
}
.inputbar textarea {
  display: inline-block;
  width: 78%;
  min-height: 48px;
  max-height: 96px;
  padding: 8px;
  font-size: 16px;
  line-height: 1.6;
  border: 2px solid #000000;
  background: #FFFFFF;
  color: #000000;
  vertical-align: top;
  font-family: inherit;
  border-radius: 0;
  outline: none;
  resize: none;
}
.inputbar button {
  display: inline-block;
  width: 20%;
  min-height: 48px;
  font-size: 16px;
  font-weight: bold;
  border: 2px solid #000000;
  background: #FFFFFF;
  color: #000000;
  cursor: pointer;
  vertical-align: top;
  margin-left: 4px;
  border-radius: 0;
  padding: 0;
}
.inputbar button:disabled {
  background: #000000;
  color: #FFFFFF;
}
</style>
</head>
<body>

<div class="topbar">
  <span class="title">E-Ink LLM Chat</span>
  <button type="button" class="settings-btn" id="btnSettings">设置</button>
</div>

<div class="modelbar" id="modelbar">
  <label for="modelSelect">当前模型</label>
  <select id="modelSelect"></select>
  <span class="empty" id="modelEmpty" style="display:none;">尚未添加模型，请打开「设置」新增。</span>
</div>

<div class="settings" id="settings">
  <h2>模型配置</h2>
  <div class="toolbar">
    <button type="button" id="btnAddModel">新增模型</button>
    <button type="button" id="btnExport">导出配置</button>
    <button type="button" id="btnImport">导入配置</button>
    <input type="file" id="importFile" accept="application/json,.json" style="display:none;">
  </div>
  <div class="export-area" id="exportArea" style="display:none;">
    <label>配置 JSON（全选复制后粘贴到文本编辑器保存为 .json 文件）</label>
    <textarea id="exportText" readonly></textarea>
    <div class="export-actions">
      <button type="button" id="btnCopyExport">复制全部</button>
      <button type="button" id="btnCloseExport">关闭</button>
    </div>
  </div>
  <div id="modelList"></div>
</div>

<div class="chat" id="chat"></div>

<div class="inputbar" id="inputbar">
  <textarea id="input" placeholder="输入消息..." rows="1"></textarea>
  <button type="button" id="btnSend">发送</button>
</div>

<script>
(function () {
  'use strict';

  // ---- Storage schema ----
  // {
  //   schema: 2,
  //   currentId: "<model id>",
  //   models: [
  //     { id, displayName, modelId, baseUrl, apiKey, extra_body }
  //   ]
  // }
  var STORAGE_KEY = 'eink_llm_config';
  var SCHEMA_VERSION = 2;

  var DEFAULT_BASE_URL = 'https://api.openai.com/v1';

  var state = {
    currentId: '',
    models: [] // array of model config objects
  };
  var history = []; // conversation history for the LLM
  var sending = false;

  // ---- DOM ----
  var elSettings = document.getElementById('settings');
  var elBtnSettings = document.getElementById('btnSettings');
  var elModelSelect = document.getElementById('modelSelect');
  var elModelEmpty = document.getElementById('modelEmpty');
  var elModelList = document.getElementById('modelList');
  var elBtnAddModel = document.getElementById('btnAddModel');
  var elBtnExport = document.getElementById('btnExport');
  var elBtnImport = document.getElementById('btnImport');
  var elImportFile = document.getElementById('importFile');
  var elExportArea = document.getElementById('exportArea');
  var elExportText = document.getElementById('exportText');
  var elBtnCopyExport = document.getElementById('btnCopyExport');
  var elBtnCloseExport = document.getElementById('btnCloseExport');
  var elChat = document.getElementById('chat');
  var elInput = document.getElementById('input');
  var elBtnSend = document.getElementById('btnSend');
  var elInputBar = document.getElementById('inputbar');

  // ---- Utils ----
  function genId() {
    return 'm_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 8);
  }

  function findModel(id) {
    for (var i = 0; i < state.models.length; i++) {
      if (state.models[i].id === id) return state.models[i];
    }
    return null;
  }

  function currentModel() {
    return findModel(state.currentId);
  }

  // Keep body's bottom padding ≥ inputbar height so the last bubble is never
  // covered by the fixed input bar (matters when textarea grows multi-line).
  function syncInputBarPadding() {
    if (!elInputBar) return;
    var h = elInputBar.offsetHeight || 0;
    if (h > 0) document.body.style.paddingBottom = (h + 24) + 'px';
  }

  // Scroll the page to the bottom after the browser has laid out the new
  // content. Two rAFs guarantee the appended bubble is measured.
  function scrollToBottom() {
    requestAnimationFrame(function () {
      requestAnimationFrame(function () {
        var target = Math.max(
          document.body.scrollHeight,
          document.documentElement.scrollHeight
        );
        window.scrollTo(0, target);
      });
    });
  }

  // ---- Persistence ----
  function loadState() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return { currentId: '', models: [] };
      var obj = JSON.parse(raw);

      // Migrate legacy single-model schema (v1):
      // { baseUrl, apiKey, model }
      if (obj && (typeof obj.schema !== 'number') &&
          (typeof obj.baseUrl === 'string' || typeof obj.apiKey === 'string' || typeof obj.model === 'string')) {
        var legacyModel = {
          id: genId(),
          displayName: (typeof obj.model === 'string' && obj.model) ? obj.model : '默认模型',
          modelId: typeof obj.model === 'string' ? obj.model : '',
          baseUrl: typeof obj.baseUrl === 'string' ? obj.baseUrl : DEFAULT_BASE_URL,
          apiKey: typeof obj.apiKey === 'string' ? obj.apiKey : ''
        };
        return { currentId: legacyModel.id, models: [legacyModel] };
      }

      var models = Array.isArray(obj && obj.models) ? obj.models : [];
      var clean = [];
      for (var i = 0; i < models.length; i++) {
        var m = models[i];
        if (!m || typeof m !== 'object') continue;
        clean.push({
          id: typeof m.id === 'string' && m.id ? m.id : genId(),
          displayName: typeof m.displayName === 'string' ? m.displayName : '',
          modelId: typeof m.modelId === 'string' ? m.modelId : '',
          baseUrl: typeof m.baseUrl === 'string' ? m.baseUrl : '',
          apiKey: typeof m.apiKey === 'string' ? m.apiKey : '',
          extra_body: typeof m.extra_body === 'string' ? m.extra_body : ''
        });
      }
      var currentId = (obj && typeof obj.currentId === 'string') ? obj.currentId : '';
      if (currentId && !clean.some(function (m) { return m.id === currentId; })) {
        currentId = clean.length > 0 ? clean[0].id : '';
      }
      if (!currentId && clean.length > 0) currentId = clean[0].id;
      return { currentId: currentId, models: clean };
    } catch (e) {
      return { currentId: '', models: [] };
    }
  }

  function saveState() {
    try {
      var payload = {
        schema: SCHEMA_VERSION,
        currentId: state.currentId,
        models: state.models
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
    } catch (e) {
      // silent: storage quota or disabled
    }
  }

  // ---- Config import / export ----
  function exportConfig() {
    try {
      var payload = {
        schema: SCHEMA_VERSION,
        currentId: state.currentId,
        models: state.models
      };
      var json = JSON.stringify(payload, null, 2);
      elExportText.value = json;
      elExportArea.style.display = 'block';
      // Auto-select the text so the user can immediately copy
      elExportText.focus();
      elExportText.select();
      appendMessage('system', '配置已生成，请全选复制后保存为 .json 文件。共 ' + state.models.length + ' 个模型。');
    } catch (e) {
      appendMessage('system', '导出失败：' + (e && e.message ? e.message : String(e)));
    }
  }

  function copyExport() {
    try {
      elExportText.focus();
      elExportText.select();
      var ok = false;
      if (document.execCommand && document.execCommand('copy')) {
        ok = true;
      }
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(elExportText.value);
        ok = true;
      }
      appendMessage('system', ok ? '配置已复制到剪贴板。' : '复制失败，请手动全选复制。');
    } catch (e) {
      appendMessage('system', '复制失败，请手动全选复制。');
    }
  }

  function importConfig(file) {
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function (ev) {
      try {
        var raw = ev.target.result;
        var obj = JSON.parse(raw);

        if (!obj || typeof obj !== 'object') {
          appendMessage('system', '导入失败：文件内容不是有效的 JSON 对象。');
          return;
        }
        if (!Array.isArray(obj.models)) {
          appendMessage('system', '导入失败：缺少 models 数组，文件格式不正确。');
          return;
        }

        var clean = [];
        for (var i = 0; i < obj.models.length; i++) {
          var m = obj.models[i];
          if (!m || typeof m !== 'object') continue;
          clean.push({
            id: typeof m.id === 'string' && m.id ? m.id : genId(),
            displayName: typeof m.displayName === 'string' ? m.displayName : '',
            modelId: typeof m.modelId === 'string' ? m.modelId : '',
            baseUrl: typeof m.baseUrl === 'string' ? m.baseUrl : '',
            apiKey: typeof m.apiKey === 'string' ? m.apiKey : '',
            extra_body: typeof m.extra_body === 'string' ? m.extra_body : ''
          });
        }

        if (clean.length === 0) {
          appendMessage('system', '导入失败：文件中没有有效的模型配置。');
          return;
        }

        var currentId = (typeof obj.currentId === 'string') ? obj.currentId : '';
        if (!currentId || !clean.some(function (m) { return m.id === currentId; })) {
          currentId = clean[0].id;
        }

        state.currentId = currentId;
        state.models = clean;
        saveState();
        renderModelSelect();
        renderModelList();
        appendMessage('system', '已成功导入 ' + clean.length + ' 个模型配置。');
      } catch (e) {
        appendMessage('system', '导入失败：' + (e && e.message ? e.message : String(e)));
      }
    };
    reader.onerror = function () {
      appendMessage('system', '导入失败：无法读取文件。');
    };
    reader.readAsText(file);
  }

  // ---- UI: settings panel ----
  function toggleSettings() {
    if (elSettings.className.indexOf('open') >= 0) {
      elSettings.className = 'settings';
    } else {
      elSettings.className = 'settings open';
    }
  }

  function modelLabel(m) {
    var name = (m.displayName || '').trim();
    if (!name) name = (m.modelId || '').trim();
    if (!name) name = '(未命名)';
    return name;
  }

  function renderModelSelect() {
    // Clear options
    while (elModelSelect.firstChild) elModelSelect.removeChild(elModelSelect.firstChild);

    if (state.models.length === 0) {
      elModelSelect.style.display = 'none';
      elModelEmpty.style.display = 'inline-block';
      return;
    }
    elModelSelect.style.display = 'inline-block';
    elModelEmpty.style.display = 'none';

    for (var i = 0; i < state.models.length; i++) {
      var m = state.models[i];
      var opt = document.createElement('option');
      opt.value = m.id;
      opt.textContent = modelLabel(m);
      if (m.id === state.currentId) opt.selected = true;
      elModelSelect.appendChild(opt);
    }
  }

  function renderModelList() {
    while (elModelList.firstChild) elModelList.removeChild(elModelList.firstChild);

    if (state.models.length === 0) {
      var hint = document.createElement('div');
      hint.className = 'empty-hint';
      hint.textContent = '尚未添加任何模型。点击上方「新增模型」按钮开始配置。';
      elModelList.appendChild(hint);
      return;
    }

    for (var i = 0; i < state.models.length; i++) {
      elModelList.appendChild(buildModelCard(state.models[i]));
    }
  }

  function buildModelCard(m) {
    var card = document.createElement('div');
    card.className = 'model-card' + (m.id === state.currentId ? ' current' : '');

    // Header
    var header = document.createElement('div');
    header.className = 'card-header';
    var nameSpan = document.createElement('span');
    nameSpan.className = 'name';
    nameSpan.textContent = modelLabel(m);
    header.appendChild(nameSpan);
    if (m.id === state.currentId) {
      var badge = document.createElement('span');
      badge.className = 'badge';
      badge.textContent = '当前';
      header.appendChild(badge);
    }
    card.appendChild(header);

    // Fields: displayName, modelId, baseUrl, apiKey
    card.appendChild(buildField(m, 'displayName', '显示名称', 'text', '例如：GPT-4o mini', '在顶部模型切换栏中显示的名称'));
    card.appendChild(buildField(m, 'modelId', '模型 ID', 'text', '例如：gpt-4o-mini', '请求时使用的 model 字段值'));
    card.appendChild(buildField(m, 'baseUrl', 'API 地址（baseURL）', 'text', 'https://api.openai.com/v1', '兼容 OpenAI 协议的 Chat Completions 接口根地址'));
    card.appendChild(buildField(m, 'apiKey', 'API 密钥', 'password', 'sk-...', '仅保存在本设备浏览器缓存中，不会上传'));
    card.appendChild(buildField(m, 'extra_body', '额外请求参数（extra_body）', 'textarea', '{"enable_thinking": false}', 'JSON 格式的额外参数，将合并到请求体中。留空则不添加。例如控制是否思考：{"enable_thinking": false}'));

    // Actions
    var actions = document.createElement('div');
    actions.className = 'actions';

    var btnSetCurrent = document.createElement('button');
    btnSetCurrent.type = 'button';
    if (m.id === state.currentId) {
      btnSetCurrent.textContent = '已是当前';
      btnSetCurrent.disabled = true;
    } else {
      btnSetCurrent.textContent = '设为当前';
      btnSetCurrent.className = 'primary';
      btnSetCurrent.addEventListener('click', function () {
        setCurrent(m.id);
      });
    }
    actions.appendChild(btnSetCurrent);

    var btnDelete = document.createElement('button');
    btnDelete.type = 'button';
    btnDelete.textContent = '删除';
    btnDelete.addEventListener('click', function () {
      deleteModel(m.id);
    });
    actions.appendChild(btnDelete);

    card.appendChild(actions);
    return card;
  }

  function buildField(m, key, labelText, inputType, placeholder, hintText) {
    var row = document.createElement('div');
    row.className = 'row';

    var lbl = document.createElement('label');
    lbl.textContent = labelText;
    row.appendChild(lbl);

    var input;
    if (inputType === 'textarea') {
      input = document.createElement('textarea');
      input.rows = 3;
    } else {
      input = document.createElement('input');
      input.type = inputType;
    }
    input.value = m[key] || '';
    input.placeholder = placeholder;
    input.autocomplete = 'off';
    input.spellcheck = false;
    input.addEventListener('input', function () {
      m[key] = input.value;
      saveState();
      // Live-update header name + selector label when displayName/modelId changes
      if (key === 'displayName' || key === 'modelId') {
        var headerNameEl = input.parentNode && input.parentNode.parentNode
          && input.parentNode.parentNode.querySelector
          ? input.parentNode.parentNode.querySelector('.card-header .name')
          : null;
        if (headerNameEl) headerNameEl.textContent = modelLabel(m);
        // Refresh the option text in the selector
        for (var i = 0; i < elModelSelect.options.length; i++) {
          if (elModelSelect.options[i].value === m.id) {
            elModelSelect.options[i].textContent = modelLabel(m);
            break;
          }
        }
      }
    });
    row.appendChild(input);

    if (hintText) {
      var hint = document.createElement('span');
      hint.className = 'hint';
      hint.textContent = hintText;
      row.appendChild(hint);
    }

    return row;
  }

  // ---- Model CRUD ----
  function addModel() {
    var m = {
      id: genId(),
      displayName: '新模型 ' + (state.models.length + 1),
      modelId: '',
      baseUrl: DEFAULT_BASE_URL,
      apiKey: '',
      extra_body: ''
    };
    state.models.push(m);
    if (!state.currentId) state.currentId = m.id;
    saveState();
    renderModelSelect();
    renderModelList();
  }

  function deleteModel(id) {
    var idx = -1;
    for (var i = 0; i < state.models.length; i++) {
      if (state.models[i].id === id) { idx = i; break; }
    }
    if (idx < 0) return;
    if (!window.confirm('确认删除模型「' + modelLabel(state.models[idx]) + '」？')) return;

    state.models.splice(idx, 1);
    if (state.currentId === id) {
      state.currentId = state.models.length > 0 ? state.models[0].id : '';
    }
    saveState();
    renderModelSelect();
    renderModelList();
  }

  function setCurrent(id) {
    if (!findModel(id)) return;
    state.currentId = id;
    saveState();
    renderModelSelect();
    renderModelList();
    appendMessage('system', '已切换到模型：' + modelLabel(findModel(id)));
  }

  // ---- Chat UI ----
  function appendMessage(role, text, opts) {
    var wrap = document.createElement('div');
    var cls = 'msg';
    if (role === 'user') cls += ' user';
    else if (role === 'assistant') cls += ' bot';
    else cls += ' sys';
    wrap.className = cls;

    if (opts && opts.meta) {
      var meta = document.createElement('div');
      meta.className = 'meta';
      meta.textContent = opts.meta;
      wrap.appendChild(meta);
    }

    var bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    wrap.appendChild(bubble);
    elChat.appendChild(wrap);

    scrollToBottom();
    return bubble;
  }

  function vibrate(ms) {
    try {
      if (navigator && typeof navigator.vibrate === 'function') {
        navigator.vibrate(ms);
      }
    } catch (e) { /* ignore */ }
  }

  // ---- Send ----
  function send() {
    if (sending) return;
    var text = elInput.value.trim();
    if (!text) return;

    var m = currentModel();
    if (!m) {
      appendMessage('system', '尚未添加任何模型，请打开「设置」新增一个模型。');
      elSettings.className = 'settings open';
      return;
    }
    if (!m.apiKey) {
      appendMessage('system', '当前模型「' + modelLabel(m) + '」未填写 API 密钥，请在「设置」中补全。');
      elSettings.className = 'settings open';
      return;
    }
    if (!m.modelId) {
      appendMessage('system', '当前模型「' + modelLabel(m) + '」未填写模型 ID，请在「设置」中补全。');
      elSettings.className = 'settings open';
      return;
    }
    var baseUrl = (m.baseUrl || DEFAULT_BASE_URL).trim();
    if (!baseUrl) baseUrl = DEFAULT_BASE_URL;

    elInput.value = '';
    appendMessage('user', text);
    history.push({ role: 'user', content: text });
    vibrate(50);

    sending = true;
    elBtnSend.disabled = true;
    var pending = appendMessage('assistant', '...', { meta: modelLabel(m) });

    var url = baseUrl.replace(/\/+$/, '') + '/chat/completions';
    var payload = {
      model: m.modelId,
      messages: history.slice(),
      stream: false
    };

    if (m.extra_body && m.extra_body.trim()) {
      var extra;
      try {
        extra = JSON.parse(m.extra_body);
      } catch (e) {
        pending.textContent = '[extra_body 解析失败] ' + (e && e.message ? e.message : String(e)) + '。请在设置中检查 JSON 格式。';
        sending = false;
        elBtnSend.disabled = false;
        return;
      }
      if (extra && typeof extra === 'object' && !Array.isArray(extra)) {
        for (var k in extra) {
          if (extra.hasOwnProperty(k)) {
            payload[k] = extra[k];
          }
        }
      }
    }

    fetch(url, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + m.apiKey
      },
      body: JSON.stringify(payload)
    }).then(function (resp) {
      return resp.text().then(function (body) {
        return { ok: resp.ok, status: resp.status, body: body };
      });
    }).then(function (r) {
      if (!r.ok) {
        pending.textContent = '[错误 ' + r.status + '] ' + r.body;
        return;
      }
      var data;
      try {
        data = JSON.parse(r.body);
      } catch (e) {
        pending.textContent = '[解析失败] ' + r.body;
        return;
      }
      var reply = '';
      if (data && data.choices && data.choices[0]) {
        var c = data.choices[0];
        if (c.message && typeof c.message.content === 'string') reply = c.message.content;
        else if (typeof c.text === 'string') reply = c.text;
      }
      if (!reply) reply = '[空回复]';
      pending.textContent = reply;
      history.push({ role: 'assistant', content: reply });
      scrollToBottom();
    }).catch(function (err) {
      pending.textContent = '[网络错误] ' + (err && err.message ? err.message : String(err));
      scrollToBottom();
    }).then(function () {
      sending = false;
      elBtnSend.disabled = false;
    });
  }

  // ---- Init ----
  function init() {
    var loaded = loadState();
    state.currentId = loaded.currentId;
    state.models = loaded.models;
    saveState(); // persist normalized form (migrates legacy schema on first load)

    renderModelSelect();
    renderModelList();

    elBtnSettings.addEventListener('click', toggleSettings);
    elBtnAddModel.addEventListener('click', addModel);
    elBtnSend.addEventListener('click', send);

    elBtnExport.addEventListener('click', exportConfig);
    elBtnCopyExport.addEventListener('click', copyExport);
    elBtnCloseExport.addEventListener('click', function () {
      elExportArea.style.display = 'none';
    });
    elBtnImport.addEventListener('click', function () {
      if (state.models.length > 0) {
        if (!window.confirm('导入配置将覆盖当前所有模型设置，是否继续？')) return;
      }
      elImportFile.click();
    });
    elImportFile.addEventListener('change', function () {
      var file = elImportFile.files && elImportFile.files[0];
      if (file) importConfig(file);
      elImportFile.value = '';
    });

    elModelSelect.addEventListener('change', function () {
      setCurrent(elModelSelect.value);
    });

    elInput.addEventListener('keydown', function (e) {
      // Ctrl+Enter to send; plain Enter inserts newline (better for soft keyboards)
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
        e.preventDefault();
        send();
      }
    });

    // Keep bottom padding in sync with the actual input bar height so a
    // multi-line textarea never hides the latest message.
    elInput.addEventListener('input', syncInputBarPadding);
    window.addEventListener('resize', syncInputBarPadding);
    syncInputBarPadding();

    if (state.models.length === 0) {
      elSettings.className = 'settings open';
      appendMessage('system', '欢迎使用 E-Ink LLM Chat。请在「设置」中「新增模型」并填写显示名称、模型 ID、API 地址与密钥后开始对话。');
    } else {
      var m = currentModel();
      if (m && !m.apiKey) {
        appendMessage('system', '当前模型「' + modelLabel(m) + '」尚未填写 API 密钥，请在「设置」中补全。');
      }
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
